name: Train Model

on:
  push:
    branches: [main]
    paths:
      - 'model_compression/**'
      - 'requirements.txt'
      - '.github/workflows/train.yml'   # 워크플로우 자체 변경도 트리거
  workflow_dispatch:                   # 수동 실행 가능

concurrency:
  group: train-${{ github.ref }}
  cancel-in-progress: false            # 학습은 중간 취소 비권장

jobs:
  train:
    runs-on: [self-hosted, linux, ml-server]
    timeout-minutes: 720               # 학습 최대 12시간
    env:
      COMMIT_SHA: ${{ github.sha }}
      IMAGE: ${{ vars.IMAGE }}
      MODELS_DIR: ${{ vars.MODELS_DIR }}
      LOGS_DIR: ${{ vars.LOGS_DIR }}
      SRC_PATH: model_compression       # 사용자 요청의 'src' → 실제 디렉토리

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sanity check (server env)
        run: |
          set -e
          echo "Runner: $(hostname)"
          echo "Image:  ${IMAGE:?IMAGE variable is required}"
          docker --version
          test -d "$MODELS_DIR" || mkdir -p "$MODELS_DIR"
          test -d "$LOGS_DIR" || mkdir -p "$LOGS_DIR"

      - name: Run training
        id: train
        run: bash scripts/train.sh "${COMMIT_SHA}"

      - name: Notify NPU-Sim-Repo
        if: success()
        env:
          DISPATCH_TOKEN: ${{ secrets.NPU_DISPATCH_TOKEN }}
        run: |
          set -e
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Kwon-GiHwan/NPU-Sim-Repo/dispatches \
            -d "$(jq -n \
                  --arg commit "${COMMIT_SHA}" \
                  --arg model_path "${MODELS_DIR}/model_${COMMIT_SHA}.tflite" \
                  --arg source_repo "${GITHUB_REPOSITORY}" \
                  '{event_type: "model_trained",
                    client_payload: {commit:$commit, model_path:$model_path, source_repo:$source_repo}}')"

      - name: Upload training log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-log-${{ github.sha }}
          path: ${{ env.LOGS_DIR }}/train_${{ github.sha }}.log
          if-no-files-found: warn
          retention-days: 14
