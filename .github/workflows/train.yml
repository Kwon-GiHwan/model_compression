name: Train Model

on:
  push:
    branches: [main]
    paths:
      - 'model_compression/**'
      - 'requirements.txt'
      - '.github/workflows/train.yml'   # 워크플로우 자체 변경도 트리거
  workflow_dispatch:                   # 수동 실행 가능

concurrency:
  group: train-${{ github.ref }}
  cancel-in-progress: false            # 학습은 중간 취소 비권장

jobs:
  train:
    runs-on: [self-hosted, linux, ml-server]
    timeout-minutes: 720               # 학습 최대 12시간
    env:
      COMMIT_SHA: ${{ github.sha }}
      CONFIG_FILE: /home/gihwan/.ml-train.env
      SRC_PATH: model_compression       # 사용자 요청의 'src' → 실제 디렉토리

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Load server config
        run: |
          set -e
          if [[ ! -r "$CONFIG_FILE" ]]; then
            echo "ERROR: config file not found or unreadable: $CONFIG_FILE" >&2
            echo "서버에 ${CONFIG_FILE} 파일을 chmod 600 으로 작성해야 합니다." >&2
            echo "내용 예시는 docs/2026-04-26-ci-runner-setup.md 참조." >&2
            exit 1
          fi
          # 권한이 600 또는 400 이어야 함 (그룹/타인에게 노출 금지)
          mode="$(stat -c '%a' "$CONFIG_FILE")"
          case "$mode" in
            600|400) ;;
            *)
              echo "ERROR: $CONFIG_FILE permissions must be 600 (or 400), got $mode" >&2
              echo "  fix: chmod 600 $CONFIG_FILE" >&2
              exit 1
              ;;
          esac
          # KEY=VALUE 라인을 GITHUB_ENV에 주입 (주석/빈줄 무시, 따옴표 제거)
          while IFS='=' read -r key value; do
            # 빈 줄, 주석 무시
            [[ -z "$key" || "$key" =~ ^[[:space:]]*# ]] && continue
            # key 양쪽 공백 제거
            key="${key#"${key%%[![:space:]]*}"}"
            key="${key%"${key##*[![:space:]]}"}"
            # value 양쪽 공백 + 따옴표 제거
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            value="${value%\"}"; value="${value#\"}"
            value="${value%\'}"; value="${value#\'}"
            echo "${key}=${value}" >> "$GITHUB_ENV"
            # 토큰성 키는 logs 마스킹
            if [[ "$key" =~ TOKEN|SECRET|PASSWORD|APIKEY|API_KEY ]]; then
              echo "::add-mask::${value}"
            fi
          done < "$CONFIG_FILE"

      - name: Sanity check (server env)
        run: |
          set -e
          echo "Runner: $(hostname)"
          : "${IMAGE:?IMAGE not loaded from $CONFIG_FILE}"
          : "${MODELS_DIR:?MODELS_DIR not loaded from $CONFIG_FILE}"
          : "${LOGS_DIR:?LOGS_DIR not loaded from $CONFIG_FILE}"
          docker --version
          test -d "$MODELS_DIR" || mkdir -p "$MODELS_DIR"
          test -d "$LOGS_DIR" || mkdir -p "$LOGS_DIR"

      - name: Run training
        id: train
        run: bash scripts/train.sh "${COMMIT_SHA}"

      - name: Notify NPU-Sim-Repo
        if: success()
        run: |
          set -e
          : "${NPU_DISPATCH_TOKEN:?token not loaded from $CONFIG_FILE}"
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${NPU_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Kwon-GiHwan/NPU-Sim-Repo/dispatches \
            -d "$(jq -n \
                  --arg commit "${COMMIT_SHA}" \
                  --arg model_path "${MODELS_DIR}/model_${COMMIT_SHA}.tflite" \
                  --arg source_repo "${GITHUB_REPOSITORY}" \
                  '{event_type: "model_trained",
                    client_payload: {commit:$commit, model_path:$model_path, source_repo:$source_repo}}')"

      - name: Upload training log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-log-${{ github.sha }}
          path: ${{ env.LOGS_DIR }}/train_${{ github.sha }}.log
          if-no-files-found: warn
          retention-days: 14
